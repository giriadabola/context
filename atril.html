<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">

    <title>Atril</title>
    <style>
       :root {
    color-scheme: dark light;
}
body {
    font-family: sans-serif;
    margin: 0;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background-color: #1e1e1e;
    color: #d4d4d4;
}
.column {
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    overflow-y: auto;
}
#left-column {
    flex: 0 0 300px;
    border-right: 1px solid #444;
    background-color: #252525;
}
#left-column h2 {
    margin-top: 0;
    color: #e0e0e0;
    border-bottom: 1px solid #444;
    padding-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
#settingsGearBtn, #downloadPdfBtn {
    cursor: pointer;
    font-size: 0.9em;
    padding: 5px;
    background: none;
    border: none;
    color: #d4d4d4;
}
#settingsGearBtn:hover, #downloadPdfBtn:hover {
    color: #c0c0c0;
}
#document-titles-list {
    list-style: none;
    padding: 0;
    margin: 0;
}
#document-titles-list li button {
    display: block;
    width: 100%;
    padding: 10px 15px;
    margin-bottom: 5px;
    background-color: #383838;
    color: #c0c0c0;
    border: 1px solid #555;
    border-radius: 4px;
    text-align: left;
    cursor: pointer;
    font-size: 0.95em;
}
#document-titles-list li button:hover,
#document-titles-list li button.active {
    background-color: #3a7ca5;
    color: white;
    border-color: #3a7ca5;
}
#loading-docs-message {
    color: #999;
}
#right-column {
    flex: 1;
    padding-left: 30px;
    position: relative;
}
#selected-doc-title {
    display: flex;
    align-items: center;
    font-size: 1.8em;
    margin-top: 0;
    margin-bottom: 20px;
    color: #e0e0e0;
    border-bottom: 1px solid #444;
    padding-bottom: 15px;
}
#selected-doc-references-container {
    margin-top: 40px;
    border-top: 1px solid #444;
    padding-top: 20px;
}
#selected-doc-references-container h3 {
    margin-bottom: 15px;
    color: #c0c0c0;
}
#selected-doc-references-list {
    list-style: none;
    padding: 0;
}
#selected-doc-references-list li {
    background: #353535;
    padding: 10px 15px;
    margin-bottom: 8px;
    border-radius: 4px;
    border: 1px solid #484848;
}
#selected-doc-references-list li .ref-title-atril {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
    color: #b0c4de;
}
#selected-doc-references-list li .ref-url-item-atril a {
    text-decoration: none;
    color: #7aa0c7;
    word-break: break-all;
    display: block;
    margin-top: 3px;
}
#selected-doc-references-list li .ref-url-item-atril a:hover {
    text-decoration: underline;
    color: #87cefa;
}
#no-doc-selected {
    color: #999;
    font-style: italic;
}
.atril-highlight-scroll {
    background-color: #2c3e50 !important;
    transition: background-color 0.3s ease-out;
    border-radius: 3px;
    color: #e0efff !important;
}
#selected-doc-references-list li.atril-highlight-scroll {
    background-color: #5a512e !important;
}
sup.ref-marker-popup.atril-highlight-scroll {
     background-color: #5a512e !important;
}
.status-indicator {
    font-size: 0.8em;
    color: #888;
    margin-left: 10px;
}
.editor-cursor-indicator {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background-color: #f0ad4e;
    margin-left: -1px;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
}
@keyframes blink {
    50% { opacity: 0; }
}
sup.ref-marker-popup {
    cursor: pointer;
    color: #7aa0c7;
    font-size: 0.8em;
    font-weight: bold;
    line-height: 1;
    vertical-align: super;
    margin: 0 1px;
    padding: 1px 2px;
    border-radius: 2px;
}
sup.ref-marker-popup a {
    color: inherit;
    text-decoration: none;
}
sup.ref-marker-popup:hover,
sup.ref-marker-popup:hover a {
    background-color: #384858;
    color: #a8c8e8;
    text-decoration: none;
}
#referencePopup {
    font-size: 0.85em; 
    max-height: 250px; 
    overflow-y: auto;  
}
#referencePopupTitle {
    font-size: 1.05em;
}
#referencePopupUrls a {

    text-decoration: none;
    word-break: break-all; 
    color: #87cefa; 
    font-size: 0.95em; 
    line-height: 1.4;
    padding-top: 8px;
    padding-bottom: 8px;
    margin-bottom: 0;
    border-bottom: 1px dotted #5c5c5c;
    border-radius: 2px;
    transition: background-color 0.2s ease-in-out;
}
#referencePopupUrls a:last-child {
    border-bottom: none;
}
#referencePopupUrls a:hover {
    text-decoration: underline;
    background-color: rgba(255, 255, 255, 0.07);
}

/* 1. Define o estilo base para o contêiner do corpo do documento.
   O JavaScript irá alterar a propriedade 'font-size' deste elemento. */
#selected-doc-body {
    margin-bottom: 30px;
    font-family: Arial, sans-serif;
    line-height: 1.7;
    font-size: 14px; /* Tamanho inicial padrão */

/* 2. Regra para TODOS os elementos filhos dentro do corpo. */
#selected-doc-body * {
    /* Força o estilo visual (tipo, peso, estilo) a ser uniforme,
       sobrescrevendo quaisquer estilos que venham do Firebase. */
    font-family: inherit !important;
    font-weight: normal !important;
    font-style: normal !important;

    /* A propriedade 'font-size' herda o valor do pai (#selected-doc-body)
       de forma natural. A AUSÊNCIA de '!important' aqui é a chave da solução,
       permitindo que a herança dinâmica funcione. */
    font-size: inherit;
    line-height: inherit;
}
/* --- FIM DO BLOCO FINAL --- */


/* --- ESTILOS PARA MENU RESPONSIVO --- */
#mobileMenuBtn, #closeMenuBtn {
    display: none;
    background: none;
    border: none;
    color: #d4d4d4;
    cursor: pointer;
    font-size: 1.8em;
    line-height: 1;

#closeMenuBtn {

@media (max-width: 768px) {

        top: 0;
        left: 0;

        max-width: 85%;
        z-index: 1100;

        transform: translateX(-100%);

    }
    #left-column.menu-open {
        transform: translateX(0);
        box-shadow: 5px 0 15px rgba(0,0,0,0.4);
    }
    #right-column {
        padding-left: 20px;
    }
    #menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1099;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease-in-out, visibility 0.3s;
    }
    #menu-overlay.visible {
        opacity: 1;
        visibility: visible;
    }
}

 async function downloadDocumentAsPdf() {
    if (!displayedDocId || !allDocumentsData[displayedDocId]) {
        alert("Nenhum documento carregado para baixar.");
        return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const docData = allDocumentsData[displayedDocId];
    const titleText = docData.titulo || 'Documento Sem Título';
    
    const MARGIN = 20; // Margem um pouco maior para ficar elegante
    const PAGE_HEIGHT = doc.internal.pageSize.getHeight();
    const MAX_WIDTH = doc.internal.pageSize.getWidth() - MARGIN * 2;
    const LINE_HEIGHT_RATIO = 1.6;
    const PT_TO_MM = 0.352778; 
    let currentY = MARGIN;

    const bodyMarkerPositions = [];
    const firstOccurrenceInBody = {};
    const referenceListPositions = [];
    const referenceDestinations = {};

    const checkPageBreak = (neededHeight) => {
        if (currentY + neededHeight > PAGE_HEIGHT - MARGIN) {
            doc.addPage();
            currentY = MARGIN;
            return true;
        }
        return false;
    };

    const isCapslockSubtitle = (text) => {
        const trimmed = text.trim();
        return trimmed.length > 3 && trimmed === trimmed.toUpperCase() && /[A-Z]/.test(trimmed);
    };

    // FUNÇÃO PARA DESENHAR LINHA JUSTIFICADA COM SUPORTE A [N]
    const drawJustifiedLine = (line, x, y, baseSize, isLastLine = false) => {
        const parts = line.split(/(\s+|\[\d+\])/g).filter(p => p.length > 0);
        
        // Se for a última linha ou tiver apenas uma palavra, não justifica (alinha à esquerda)
        if (isLastLine || line.trim().split(/\s+/).length <= 1) {
            let curX = x;
            parts.forEach(part => {
                if (/^\[\d+\]$/.test(part)) {
                    renderSuperscript(part, curX, y, baseSize);
                    curX += doc.getTextWidth(part);
                } else {
                    doc.text(part, curX, y);
                    curX += doc.getTextWidth(part);
                }
            });
            return;
        }

        // Cálculo para Justificação
        let totalContentWidth = 0;
        let spacePartsCount = 0;

        parts.forEach(part => {
            if (part.trim() === "") {
                spacePartsCount++;
            } else if (/^\[\d+\]$/.test(part)) {
                doc.setFontSize(baseSize * 0.65);
                totalContentWidth += doc.getTextWidth(part);
                doc.setFontSize(baseSize);
            } else {
                totalContentWidth += doc.getTextWidth(part);
            }
        });

        const extraSpace = MAX_WIDTH - totalContentWidth;
        const spaceWidth = spacePartsCount > 0 ? extraSpace / spacePartsCount : 0;

        let runningX = x;
        parts.forEach(part => {
            if (part.trim() === "") {
                runningX += spaceWidth;
            } else if (/^\[\d+\]$/.test(part)) {
                renderSuperscript(part, runningX, y, baseSize);
                runningX += doc.getTextWidth(part);
            } else {
                doc.text(part, runningX, y);
                runningX += doc.getTextWidth(part);
            }
        });
    };

    const renderSuperscript = (part, x, y, baseSize) => {
        const refNum = part.match(/\d+/)[0];
        const supSize = baseSize * 0.65;
        const shiftY = baseSize * 0.4 * PT_TO_MM;
        
        doc.setFontSize(supSize);
        doc.text(part, x, y - shiftY);
        
        const partWidth = doc.getTextWidth(part);
        bodyMarkerPositions.push({
            refNum, 
            page: doc.internal.getCurrentPageInfo().pageNumber, 
            x: x, 
            y: y - shiftY - (supSize * PT_TO_MM), 
            w: partWidth, 
            h: baseSize * PT_TO_MM
        });
        
        if (!firstOccurrenceInBody[refNum]) {
            firstOccurrenceInBody[refNum] = { 
                page: doc.internal.getCurrentPageInfo().pageNumber, 
                y: y - 10 
            };
        }
        doc.setFontSize(baseSize);
    };

    // 1. Título
    doc.setFont(undefined, 'bold');
    doc.setFontSize(20);
    const splitTitle = doc.splitTextToSize(titleText, MAX_WIDTH);
    doc.text(splitTitle, MARGIN, currentY);
    currentY += (splitTitle.length * 12);

    // 2. Corpo
    const rawBodyText = selectedDocBodyEl.innerText;
    const paragraphs = rawBodyText.split('\n');

    paragraphs.forEach(p => {
        const cleaned = p.trim();
        if (!cleaned) return;

        if (isCapslockSubtitle(cleaned)) {
            doc.addPage();
            currentY = MARGIN;
            doc.setFont(undefined, 'bold');
            doc.setTextColor(58, 124, 165); 
            doc.setFontSize(14);
            doc.text(doc.splitTextToSize(cleaned, MAX_WIDTH), MARGIN, currentY);
            currentY += 12;
            doc.setFont(undefined, 'normal');
            doc.setTextColor(0, 0, 0);
        } else {
            doc.setFontSize(12);
            const lineHeight = 12 * LINE_HEIGHT_RATIO * PT_TO_MM;
            const lines = doc.splitTextToSize(cleaned, MAX_WIDTH);
            
            lines.forEach((line, index) => {
                checkPageBreak(lineHeight);
                const isLastLine = (index === lines.length - 1);
                drawJustifiedLine(line, MARGIN, currentY, 12, isLastLine);
                currentY += lineHeight;
            });
            currentY += 3; 
        }
    });

    // 3. Referências
    const references = (docData.referencias || [])
        .filter(ref => ref && ref.id && currentDocReferencesMap[ref.id] && currentDocReferencesMap[ref.id].displayNumber > 0)
        .sort((a, b) => currentDocReferencesMap[a.id].displayNumber - currentDocReferencesMap[b.id].displayNumber);

    if (references.length > 0) {
        doc.addPage();
        currentY = MARGIN;
        doc.setFont(undefined, 'bold');
        doc.setFontSize(14);
        doc.text("Referências", MARGIN, currentY);
        currentY += 10;
        doc.setFont(undefined, 'normal');
        doc.setFontSize(11);

        references.forEach(ref => {
            const refDetails = currentDocReferencesMap[ref.id];
            const refNum = refDetails.displayNumber;
            const pageNum = doc.internal.getCurrentPageInfo().pageNumber;
            referenceDestinations[refNum] = { page: pageNum, y: currentY - 5 };

            const refHeader = `[${refNum}] ${refDetails.titulo}`;
            const headerLines = doc.splitTextToSize(refHeader, MAX_WIDTH);
            headerLines.forEach((l) => {
                checkPageBreak(7);
                referenceListPositions.push({
                    refNum, page: pageNum, x: MARGIN, y: currentY - 5, w: doc.getTextWidth(l), h: 6
                });
                doc.text(l, MARGIN, currentY);
                currentY += 6;
            });

            if (refDetails.urls) {
                doc.setTextColor(0, 0, 255);
                refDetails.urls.forEach(url => {
                    const urlLines = doc.splitTextToSize(url, MAX_WIDTH - 10);
                    urlLines.forEach(l => { checkPageBreak(6); doc.text(l, MARGIN + 8, currentY, { url: url }); currentY += 5; });
                });
                doc.setTextColor(0, 0, 0);
            }
            currentY += 4;
        });
    }

    // APLICAR LINKS
    bodyMarkerPositions.forEach(pos => {
        const dest = referenceDestinations[pos.refNum];
        if (dest) {
            doc.setPage(pos.page);
            doc.link(pos.x, pos.y, pos.w, pos.h, { pageNumber: dest.page, top: dest.y });
        }
    });

    referenceListPositions.forEach(pos => {
        const origin = firstOccurrenceInBody[pos.refNum];
        if (origin) {
            doc.setPage(pos.page);
            doc.link(pos.x, pos.y, pos.w, pos.h, { pageNumber: origin.page, top: origin.y });
        }
    });

    doc.save(`${sanitizeFilename(titleText)}.pdf`);
}

function updateDisplayedDocument(docData) {
    const titleSpan = selectedDocTitleEl.querySelector('span:not(.status-indicator)');
    const shareBtn = document.getElementById('shareDocBtn');

    if (!docData) {
        noDocSelectedMsgEl.style.display = 'block';

        downloadPdfBtn.style.display = 'none';
        if (shareBtn) shareBtn.style.display = 'none';

        if (oldStats) oldStats.remove();

    }

    downloadPdfBtn.style.display = 'inline-block';

    const currentScrollTop = selectedDocBodyEl.scrollTop;
    noDocSelectedMsgEl.style.display = 'none';
    if (titleSpan) titleSpan.textContent = escapeHTML(docData.titulo) || "Documento Sem Título";
    
    currentDocReferencesMap = {};
    let referenceDisplayCounter = 1;
    const encounteredRefIdsForNumbering = {};

    if (docData.referencias && Array.isArray(docData.referencias)) {
        docData.referencias.forEach(ref => {
            if (ref && ref.id) {
                let rawUrls = [];
                if (Array.isArray(ref.urls)) {
                    rawUrls = ref.urls.map(u => (typeof u === 'object' && u !== null) ? u.url : u);
                } else if (ref.urlReferencia) {
                    rawUrls = [ref.urlReferencia];
                }

                currentDocReferencesMap[ref.id] = {
                    titulo: ref.tituloReferencia || "Referência sem título",
                    urls: rawUrls.filter(u => typeof u === 'string' && u.trim() !== ''),
                    displayNumber: 0
                };
            }
        });
    }

    let fullBodyHtml = "";
    if (typeof docData.corpo === 'string') {
        fullBodyHtml = docData.corpo;
    } else if (Array.isArray(docData.corpo)) {
    docData.corpo.forEach((item) => {
        // --- ADICIONE ESTA LINHA ABAIXO ---
        if (item && item.isHidden === true) return; // Pula este item se estiver oculto
        
        let itemHtml = "";
        if (typeof item === 'string') { 
            itemHtml = item; 
        } 
        else if (typeof item === 'object' && item !== null) {
            const commonTextProperties = ['text', 'texto', 'content', 'html', 'body'];
            let foundTextInObject = null;
            for (const prop of commonTextProperties) { 
                if (typeof item[prop] === 'string') { 
                    foundTextInObject = item[prop]; 
                    break; 
                } 
            }
            if (foundTextInObject) { 
                itemHtml = (item.html || item.innerHTML) ? foundTextInObject : `<p>${escapeHTML(foundTextInObject)}</p>`; 
            }
            else if (item.tipo === 'imagem' && item.url) { 
                itemHtml = `<figure><img src="${escapeHTML(item.url)}" style="max-width:100%;"><figcaption>${escapeHTML(item.legenda || '')}</figcaption></figure>`; 
            }
        }
        fullBodyHtml += itemHtml;
    });
}

    if (typeof fullBodyHtml === 'string') {
         fullBodyHtml = fullBodyHtml.split(CHAPTER_DELIMITER_STORAGE).join(CHAPTER_DELIMITER_VIEW);
    }
    selectedDocBodyEl.innerHTML = fullBodyHtml;

    const refElements = Array.from(selectedDocBodyEl.querySelectorAll('span.referenced-text[data-ref-id], ref[data-ref-id]'));
    refElements.forEach(el => {
        const refId = el.dataset.refId;
        if (currentDocReferencesMap[refId]) {
            if (!encounteredRefIdsForNumbering[refId]) {
                encounteredRefIdsForNumbering[refId] = referenceDisplayCounter++;
                currentDocReferencesMap[refId].displayNumber = encounteredRefIdsForNumbering[refId];
            }
            const displayNumber = encounteredRefIdsForNumbering[refId];
            const supElement = document.createElement('sup');
            supElement.className = 'ref-marker-popup'; 
            supElement.dataset.refId = refId;
            supElement.innerHTML = `[<a>${displayNumber}</a>]`;
            if (el.tagName.toLowerCase() === 'ref') {
                el.parentNode.replaceChild(supElement, el);
            } else {
                el.parentNode.insertBefore(supElement, el.nextSibling);
                el.style.backgroundColor='transparent'; el.style.color='inherit';
            }
        }
    });

    const totalRefsInList = referenceDisplayCounter - 1; 
    const uniquePublications = new Set();

    const getPublicationKey = (url) => {
        try {
            url = url.trim();
            const urlObj = new URL(url);
            if (urlObj.hostname.includes('jw.org') && urlObj.searchParams.has('docid')) {
                const docid = urlObj.searchParams.get('docid');
                const locale = urlObj.searchParams.get('wtlocale') || 'default';
                return `finder-${locale}-${docid}`;
            }
            if (urlObj.hostname.includes('wol.jw.org')) {
                let cleanPath = urlObj.pathname;
                if (cleanPath.endsWith('/')) cleanPath = cleanPath.slice(0, -1);
                return `wol-${cleanPath}`;
            }
            return url.split('#')[0].split('?')[0];
        } catch (e) { 
            return url.split('#')[0].split('?')[0].trim(); 
        }
    };

    Object.keys(encounteredRefIdsForNumbering).forEach(refId => {
        const refData = currentDocReferencesMap[refId];
        if (refData && refData.urls) {
            refData.urls.forEach(url => {
                const key = getPublicationKey(url);
                if (key) uniquePublications.add(key);
            });
        }
    });

    const uniqueCount = uniquePublications.size;
    const references = docData.referencias || [];
    if (references.length === 0 || totalRefsInList === 0) {
        referencesContainerEl.style.display = 'none'; 
    } else {
        referencesContainerEl.style.display = 'block'; 
        const h3Header = referencesContainerEl.querySelector('h3');
        if (h3Header) {
            h3Header.innerHTML = `Referências 
                <span style="font-size: 0.75em; color: #888; font-weight: normal; margin-left: 10px;">
                    (${totalRefsInList} total) ; (${uniqueCount} únicas)
                </span>`;
        }
        referencesListEl.innerHTML = "";
        const sortedRefs = references
            .filter(ref => ref && ref.id && currentDocReferencesMap[ref.id] && currentDocReferencesMap[ref.id].displayNumber > 0)
            .sort((a,b) => currentDocReferencesMap[a.id].displayNumber - currentDocReferencesMap[b.id].displayNumber);
            
        sortedRefs.forEach(ref => {
            const refDetails = currentDocReferencesMap[ref.id];
            const li = document.createElement('li'); 
            li.className = 'reference-item-atril';
            li.setAttribute('data-ref-id', escapeHTML(ref.id));
            const linksHtml = refDetails.urls.map(url => {
                const urlStr = typeof url === 'string' ? url : url.url;
                return `<div class="ref-url-item-atril"><a href="${urlStr}" target="_blank">${escapeHTML(urlStr)}</a></div>`;
            }).join('');
            li.innerHTML = `
                <span class="ref-title-atril"><sup>[${refDetails.displayNumber}]</sup> ${escapeHTML(refDetails.titulo)}</span>
                ${linksHtml}
            `;
            referencesListEl.appendChild(li);
        });
    }

    // --- LÓGICA DE ESTATÍSTICAS E CAPÍTULOS NO TOPO ---
    const rawText = selectedDocBodyEl.innerText;
    
    // 1. Contagem de Palavras e Tempo
    const textOnly = rawText.replace(/\[\d+\]/g, ''); 
    const words = textOnly.trim().split(/\s+/).filter(w => w.length > 0);
    const wordCount = words.length;
    const readingTime = Math.ceil(wordCount / 140);

    // 2. Contagem de Capítulos (CAPSLOCK)
    const lines = rawText.split('\n');
    let chapterCount = 0;
    lines.forEach(line => {
        const trimmed = line.trim();
        if (trimmed.length > 3 && /[A-Z]/.test(trimmed) && trimmed === trimmed.toUpperCase()) {
            chapterCount++;
        }
    });

    // 3. Renderização/Atualização do elemento de info (abaixo do título)
    let statsHeader = document.getElementById('doc-stats-header');
    if (!statsHeader) {
        statsHeader = document.createElement('div');
        statsHeader.id = 'doc-stats-header';
        // Estilo: itálico, pequeno, margem negativa superior para colar no título
        statsHeader.style.fontSize = '0.75em';
        statsHeader.style.fontStyle = 'italic';
        statsHeader.style.color = '#999';
        statsHeader.style.marginTop = '-15px';
        statsHeader.style.marginBottom = '20px';
        // Insere logo após o elemento de título
        selectedDocTitleEl.parentNode.insertBefore(statsHeader, selectedDocTitleEl.nextSibling);
    }
    
    const capSuffix = chapterCount === 1 ? 'capítulo' : 'capítulos';
    statsHeader.innerHTML = `${wordCount} palavras • ~${readingTime} min • ${chapterCount} ${capSuffix}`;
    // ----------------------------------------------

    applyFontSize(currentFontSizePercent);
    selectedDocBodyEl.scrollTop = currentScrollTop;
}

        function listenToDocumentContent(docId) {
            if (currentDocContentListenerUnsubscribe) currentDocContentListenerUnsubscribe();
            liveStatusIndicatorEl.textContent = "";
            const docRef = doc(db, "documentos", docId);
            currentDocContentListenerUnsubscribe = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    allDocumentsData[docId] = { id: docId, ...data };
                     if (displayedDocId === docId) {
                        updateDisplayedDocument(allDocumentsData[docId]);
                        liveStatusIndicatorEl.textContent = "Sincronizado";
                        setTimeout(() => { if (liveStatusIndicatorEl.textContent === "Sincronizado") liveStatusIndicatorEl.textContent = ""; }, 3000);
                    }
                } else {
                    liveStatusIndicatorEl.textContent = "Doc. não encontrado";
                    if (displayedDocId === docId) { updateDisplayedDocument(null); }
                }
            }, (error) => {
                liveStatusIndicatorEl.textContent = "Erro conexão";
                console.error(`Erro listener docId ${docId}:`, error);
            });
        }

        function listenToEditorCursor(docId) {
            if (editorCursorListenerUnsubscribe) editorCursorListenerUnsubscribe();
            const liveStateRef = doc(db, "documentos", docId, "liveState", "editorInfo");
            editorCursorListenerUnsubscribe = onSnapshot(liveStateRef, (docSnap) => {
                if (docSnap.exists()) {
                    const editorInfo = docSnap.data();
                    if (typeof editorInfo.cursorOffset === 'number' && displayedDocId === docId) {
                        updateCursorIndicator(editorInfo.cursorOffset);
                    }
                }
            }, (error) => { console.error(`Erro escutar cursor ${docId}:`, error); });
        }

        function updateCursorIndicator(targetOffset) {
            if (!selectedDocBodyEl || selectedDocBodyEl.textContent.trim() === "" || noDocSelectedMsgEl.style.display !== 'none') return;
            if (cursorIndicatorEl && cursorIndicatorEl.parentNode) {
                const parent = cursorIndicatorEl.parentNode;
                const prev = cursorIndicatorEl.previousSibling; const next = cursorIndicatorEl.nextSibling;
                parent.removeChild(cursorIndicatorEl);
                if (prev && prev.nodeType === Node.TEXT_NODE && next && next.nodeType === Node.TEXT_NODE) {
                    prev.nodeValue += next.nodeValue; parent.removeChild(next);
                }
                cursorIndicatorEl = null;
            }
            let accumulatedLength = 0; let found = false;
            function findAndPlaceIndicator(parentNode) {
                if (found) return;
                const childNodes = Array.from(parentNode.childNodes);
                for (let i = 0; i < childNodes.length; i++) {
                    const node = childNodes[i];
                    if (found) return;
                    if (node.nodeType === Node.TEXT_NODE) {
                        const nodeLength = node.textContent.length;
                        if (accumulatedLength + nodeLength >= targetOffset) {
                            const splitOffset = targetOffset - accumulatedLength;
                            if (splitOffset >= 0 && splitOffset <= nodeLength) {
                                const textBefore = node.textContent.substring(0, splitOffset);
                                const textAfter = node.textContent.substring(splitOffset);
                                const parent = node.parentNode;
                                if (textBefore) parent.insertBefore(document.createTextNode(textBefore), node);
                                cursorIndicatorEl = document.createElement('span'); cursorIndicatorEl.className = 'editor-cursor-indicator';
                                parent.insertBefore(cursorIndicatorEl, node);
                                if (textAfter) parent.insertBefore(document.createTextNode(textAfter), node);
                                parent.removeChild(node); found = true; return;
                            }
                        }
                        accumulatedLength += nodeLength;
                    } else if (node.nodeType === Node.ELEMENT_NODE) {
                        if (!node.classList.contains('editor-cursor-indicator') && !node.classList.contains('ref-marker-popup')) {
                            if (accumulatedLength === targetOffset && node.offsetParent !== null) {
                                 cursorIndicatorEl = document.createElement('span'); cursorIndicatorEl.className = 'editor-cursor-indicator';
                                 node.parentNode.insertBefore(cursorIndicatorEl, node); found = true; return;
                            }
                            findAndPlaceIndicator(node);
                        } else if (node.classList.contains('ref-marker-popup')) {
                            accumulatedLength += node.textContent.length;
                        }
                    }
                }
                if (!found && parentNode === selectedDocBodyEl && accumulatedLength === targetOffset && parentNode.offsetParent !== null) {
                     cursorIndicatorEl = document.createElement('span'); cursorIndicatorEl.className = 'editor-cursor-indicator';
                     parentNode.appendChild(cursorIndicatorEl); found = true;
                }
            }
            findAndPlaceIndicator(selectedDocBodyEl);
            if (!found && targetOffset === 0 && selectedDocBodyEl.firstChild && selectedDocBodyEl.offsetParent !== null) {
                cursorIndicatorEl = document.createElement('span'); cursorIndicatorEl.className = 'editor-cursor-indicator';
                selectedDocBodyEl.insertBefore(cursorIndicatorEl, selectedDocBodyEl.firstChild);
            }
        }

        function showAtrilSelectionToolbar(centerX, top) {
            // Primeiro, torna a barra de ferramentas visível para obter suas dimensões reais
            atrilSelectionToolbar.style.display = 'block';
            const toolbarWidth = atrilSelectionToolbar.offsetWidth;
            const toolbarHeight = atrilSelectionToolbar.offsetHeight;
            const margin = 10; // Espaçamento entre o texto e a barra de ferramentas
            // Calcula a posição final
            // Horizontalmente: centraliza a barra de ferramentas sobre o centro da seleção
            let finalLeft = centerX - (toolbarWidth / 2);
            // Verticalmente: posiciona a barra acima do texto selecionado
            let finalTop = top - toolbarHeight - margin;
            // --- Verificações para não sair da tela ---
            // Se não houver espaço acima, posiciona abaixo
            if (finalTop < rightColumnEl.scrollTop) {
                const rangeRect = currentAtrilSelectionRange.getBoundingClientRect();
                finalTop = top + rangeRect.height + (margin / 2);
            }
            // Garante que não saia pelos lados
            if (finalLeft < rightColumnEl.scrollLeft) {
                finalLeft = rightColumnEl.scrollLeft + 5;
            }
            if ((finalLeft + toolbarWidth) > (rightColumnEl.scrollLeft + rightColumnEl.clientWidth)) {
                finalLeft = rightColumnEl.scrollLeft + rightColumnEl.clientWidth - toolbarWidth - 5;
            }
            // Aplica as posições finais
            atrilSelectionToolbar.style.left = `${finalLeft}px`;
            atrilSelectionToolbar.style.top = `${finalTop}px`;
        }

            let popupLeft = supRect.left - bodyRect.left + window.scrollX;
            referencePopupEl.style.display = 'block'; const popupRect = referencePopupEl.getBoundingClientRect();
            
            if (popupLeft + popupRect.width > (window.innerWidth + window.scrollX - 10)) { popupLeft = window.innerWidth + window.scrollX - popupRect.width - 10; }

            if (popupTop + popupRect.height > (window.innerHeight + window.scrollY - 10)) {

                if (popupTop < (window.scrollY + 10) ) { popupTop = window.scrollY + 10; }

            referencePopupEl.style.top = `${popupTop}px`; referencePopupEl.style.left = `${popupLeft}px`;
        } else { hideReferencePopup(); }

});

    const clickedListItem = event.target.closest('li.reference-item-atril[data-ref-id]');
    if (clickedListItem) {
        const refIdToFind = clickedListItem.dataset.refId;
        const firstMarkerInBody = selectedDocBodyEl.querySelector(`sup.ref-marker-popup[data-ref-id="${refIdToFind}"]`);
        
        if (firstMarkerInBody) {
            selectedDocBodyEl.querySelectorAll('.atril-highlight-scroll').forEach(el => el.classList.remove('atril-highlight-scroll'));
            referencesListEl.querySelectorAll('li.atril-highlight-scroll').forEach(el => el.classList.remove('atril-highlight-scroll'));
            
            firstMarkerInBody.scrollIntoView({ behavior: 'smooth', block: 'center' });
            firstMarkerInBody.classList.add('atril-highlight-scroll'); 
            clickedListItem.classList.add('atril-highlight-scroll');
            
            // Simula clique para abrir o popup de referência no local do texto
            firstMarkerInBody.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
            
            setTimeout(() => {
                if (firstMarkerInBody) firstMarkerInBody.classList.remove('atril-highlight-scroll');
                if (clickedListItem) clickedListItem.classList.remove('atril-highlight-scroll');
            }, 3000);
        }
    }
});
        
        function showSettingsPopup() { settingsPopup.style.visibility = 'visible'; settingsPopup.style.opacity = '1'; }
        function hideSettingsPopup() { settingsPopup.style.opacity = '0'; settingsPopup.style.visibility = 'hidden'; }
        
   function applyFontSize(percent) {
            const scaleFactor = percent / 100;
            const BASE_BODY_PX = 16; 

            const newBodySize = BASE_BODY_PX * scaleFactor;
            const newTitleSize = newBodySize * 1.3;
            const newRefHeadingSize = newBodySize * 1.2;
            const newRefTitleSize = newBodySize * 0.95;
            const newRefUrlSize = newBodySize * 0.85;

            // --- INÍCIO DA CORREÇÃO ---
            if (selectedDocBodyEl) {
                // 1. Define o tamanho no contêiner pai (isso afeta texto solto e serve como base).
                selectedDocBodyEl.style.fontSize = `${newBodySize}px`;

                // 2. APLICAÇÃO FORÇADA: Percorre os principais elementos de bloco dentro do corpo
                // e garante que eles herdem o novo tamanho. Esta é a correção crucial
                // para anular qualquer regra CSS conflitante que possa estar fixando o tamanho.
                selectedDocBodyEl.querySelectorAll('p, div, li, h1, h2, h3, h4, h5, h6').forEach(el => {
                    // Ao definir o estilo diretamente como 'inherit', forçamos o elemento
                    // a buscar o valor que acabamos de definir no seu pai (#selected-doc-body).
                    el.style.fontSize = 'inherit';
                });
            }
            // --- FIM DA CORREÇÃO ---

            // O resto da função continua normalmente para os outros elementos da UI
            if (selectedDocTitleEl) {
                const titleSpan = selectedDocTitleEl.querySelector('span:not(.status-indicator)');
                if (titleSpan) titleSpan.style.fontSize = `${newTitleSize}px`;
            }

            if (referencesContainerEl) {
                 const refContainerTitle = referencesContainerEl.querySelector('h3');
                 if (refContainerTitle) refContainerTitle.style.fontSize = `${newRefHeadingSize}px`;
            }

            if (referencesListEl) {
                referencesListEl.querySelectorAll('.ref-title-atril').forEach(el => el.style.fontSize = `${newRefTitleSize}px`);
                referencesListEl.querySelectorAll('.ref-url-item-atril a').forEach(el => el.style.fontSize = `${newRefUrlSize}px`);
            }

            if (currentFontSizeDisplay) {
                currentFontSizeDisplay.textContent = `${percent}%`;
            }
        }
        
        function updateFontSize(change) {
            let newSize = currentFontSizePercent + change;
            if (newSize < MIN_FONT_SIZE_PERCENT) newSize = MIN_FONT_SIZE_PERCENT;
            if (newSize > MAX_FONT_SIZE_PERCENT) newSize = MAX_FONT_SIZE_PERCENT;
            currentFontSizePercent = newSize;
            applyFontSize(currentFontSizePercent);
            try { localStorage.setItem(LS_FONT_SIZE_KEY, currentFontSizePercent.toString()); }
            catch (e) { console.warn("Não foi possível salvar tamanho da fonte:", e); }
        }

        function loadFontSize() {
            try {
                const storedSize = localStorage.getItem(LS_FONT_SIZE_KEY);
                if (storedSize) {
                    const parsedSize = parseInt(storedSize, 10);
                    if (!isNaN(parsedSize) && parsedSize >= MIN_FONT_SIZE_PERCENT && parsedSize <= MAX_FONT_SIZE_PERCENT) {
                        currentFontSizePercent = parsedSize;
                    }
                }
            } catch (e) { console.warn("Não foi possível carregar tamanho da fonte:", e); }
            applyFontSize(currentFontSizePercent);
            if (currentFontSizeDisplay) currentFontSizeDisplay.textContent = `${currentFontSizePercent}%`;
        }

        if (settingsGearBtn) { settingsGearBtn.addEventListener('click', (e) => { e.stopPropagation(); if (settingsPopup.style.visibility === 'visible') { hideSettingsPopup(); } else { showSettingsPopup(); } }); }
        if (decreaseFontBtn) { decreaseFontBtn.addEventListener('click', () => updateFontSize(-FONT_SIZE_STEP)); }
        if (increaseFontBtn) { increaseFontBtn.addEventListener('click', () => updateFontSize(FONT_SIZE_STEP)); }
        if (closeSettingsPopupBtn) { closeSettingsPopupBtn.addEventListener('click', hideSettingsPopup); }
        
        selectedDocBodyEl.addEventListener('mouseup', (event) => {
            if (atrilSelectionToolbar.contains(event.target) || suggestionPopup.style.visibility === 'visible' || (referencePopupEl && referencePopupEl.style.display !== 'none' && referencePopupEl.contains(event.target)) || event.target.closest('sup.ref-marker-popup')) {
                return;
            }
            const selection = window.getSelection();
            if (selection && !selection.isCollapsed && selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                if (selectedDocBodyEl.contains(range.commonAncestorContainer)) {
                    currentAtrilSelectionRange = range.cloneRange();
                    currentAtrilSelectedText = selection.toString().trim();
                    if (currentAtrilSelectedText.length > 0) {
                        const rangeRect = range.getBoundingClientRect();
                        const containerRect = rightColumnEl.getBoundingClientRect();
                        const selectionTop = rangeRect.top - containerRect.top + rightColumnEl.scrollTop;
                        const selectionCenterX = (rangeRect.left - containerRect.left + rightColumnEl.scrollLeft) + (rangeRect.width / 2);
                        showAtrilSelectionToolbar(selectionCenterX, selectionTop);
                    } else { hideAtrilSelectionToolbar(); }
                } else { hideAtrilSelectionToolbar(); }
            } else { hideAtrilSelectionToolbar(); }
        });
        
        document.addEventListener('click', (event) => {
            if (referencePopupEl && referencePopupEl.style.display !== 'none') {
                if (!event.target.closest('sup.ref-marker-popup') && !referencePopupEl.contains(event.target)) {
                    hideReferencePopup();
                }
            }
            if (settingsPopup && settingsPopup.style.visibility === 'visible') {
                const popupContent = settingsPopup.querySelector('div > div');
                if (popupContent && !popupContent.contains(event.target) && event.target !== settingsGearBtn && !settingsGearBtn.contains(event.target)) {
                    hideSettingsPopup();
                }
            }
            if (!selectedDocBodyEl.contains(event.target) &&
                !atrilSelectionToolbar.contains(event.target) &&
                !event.target.closest('sup.ref-marker-popup') &&
                !(referencePopupEl && referencePopupEl.style.display !== 'none' && referencePopupEl.contains(event.target)) &&
                !(settingsPopup && settingsPopup.style.visibility === 'visible' && settingsPopup.querySelector('div > div').contains(event.target)) &&
                event.target !== settingsGearBtn && !settingsGearBtn.contains(event.target)
                ) {
                const selection = window.getSelection();
                if (selection && selection.isCollapsed) {
                     hideAtrilSelectionToolbar();
                } else if (!selection || selection.rangeCount === 0){
                    hideAtrilSelectionToolbar();
                }
            }
        }, true);
        
        suggestEditBtn.addEventListener('click', () => { if (currentAtrilSelectedText) { showSuggestionPopup(); hideAtrilSelectionToolbar(); } });
        cancelSuggestionBtn.addEventListener('click', hideSuggestionPopup);
        saveSuggestionBtn.addEventListener('click', saveSuggestion);

        if (downloadPdfBtn) {
            downloadPdfBtn.addEventListener('click', downloadDocumentAsPdf);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAllDocumentTitlesAndCache();
            loadFontSize();

            // --- CÓDIGO PARA CONTROLE DO MENU RESPONSIVO ---
            const toggleMenu = () => {
                leftColumnEl.classList.toggle('menu-open');
                menuOverlay.classList.toggle('visible');
            };
            if (mobileMenuBtn && closeMenuBtn && menuOverlay) {
                mobileMenuBtn.addEventListener('click', toggleMenu);
                closeMenuBtn.addEventListener('click', toggleMenu);
                menuOverlay.addEventListener('click', toggleMenu);
            }
            // Abrir o menu na primeira visita em mobile
            const hasInteracted = localStorage.getItem('atrilMenuInteracted');
            if (!hasInteracted && window.innerWidth <= 768) {
                leftColumnEl.classList.add('menu-open');
                menuOverlay.classList.add('visible');
            }
        });

// Lógica para o botão de Partilhar
document.getElementById('shareDocBtn').addEventListener('click', () => {
    if (displayedDocId) {
        // Redireciona para share.html passando o ID do documento atual
        window.location.href = `share.html?id=${displayedDocId}`;
    }

// --- LÓGICA PARA COPIAR JSON ---
const copyJsonBtn = document.getElementById('copyJsonBtn');

copyJsonBtn.addEventListener('click', async () => {
    if (!displayedDocId || !allDocumentsData[displayedDocId]) {
        alert("Por favor, selecione um documento primeiro.");
        return;
    }

    const docData = allDocumentsData[displayedDocId];
    
    // Função auxiliar para processar o HTML e converter spans de referência em [[texto]][n]
    const obterCorpoComMarcacao = (container) => {
        let resultado = "";
        // Percorre os nós para manter a ordem e identificar os spans de referência
        container.childNodes.forEach(node => {
            if (node.nodeType === Node.TEXT_NODE) {
                resultado += node.textContent;
            } else if (node.nodeType === Node.ELEMENT_NODE) {
                if (node.classList.contains('referenced-text')) {
                    // Texto que deve ser sublinhado
                    resultado += `[[${node.textContent}]]`;
                } else if (node.classList.contains('ref-marker-popup')) {
                    // O número da referência [n]
                    resultado += node.innerText;
                } else {
                    // Se for parágrafo ou outra tag, processa o interior e add quebra de linha se necessário
                    const prefixo = (node.tagName === 'P' || node.tagName === 'DIV') ? "" : "";
                    const sufixo = (node.tagName === 'P' || node.tagName === 'DIV') ? "\n" : "";
                    resultado += prefixo + obterCorpoComMarcacao(node) + sufixo;
                }
            }
        });
        return resultado.trim().replace(/\n\s*\n/g, '\n'); // Limpa quebras excessivas
    };

    const corpoTextoFormatado = obterCorpoComMarcacao(selectedDocBodyEl);

    const exportRefs = [];
    for (const refId in currentDocReferencesMap) {
        const ref = currentDocReferencesMap[refId];
        if (ref.displayNumber > 0) {
            exportRefs.push({
                numero: ref.displayNumber,
                titulo: ref.titulo,
                links: ref.urls.map(u => (typeof u === 'string' ? u : u.url))
            });
        }
    }
    exportRefs.sort((a, b) => a.numero - b.numero);

    const exportObj = {
        titulo: docData.titulo,
        corpo: corpoTextoFormatado,
        referencias: exportRefs,
        exportadoEm: new Date().toLocaleString()
    };

    try {
        const jsonStr = JSON.stringify(exportObj, null, 4);
        await navigator.clipboard.writeText(jsonStr);
        copyJsonBtn.textContent = "✅ JSON com Sublinhado Copiado!";
        copyJsonBtn.style.backgroundColor = "#4CAF50";
        setTimeout(() => {
            copyJsonBtn.textContent = "📋 Copiar JSON do Documento";
            copyJsonBtn.style.backgroundColor = "";
        }, 2000);
    } catch (err) {
        alert("Erro ao copiar.");
    }
});
