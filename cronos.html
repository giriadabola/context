<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronologia Mundial (A.C.)</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-color: #1e1e1e;
            --surface-color: #2d2d2d;
            --sidebar-color: #252526;
            --text-color: #d4d4d4;
            --primary-color: #3a7ca5;
            --primary-hover-color: #4a90c2;
            --border-color: #3a3a3a;
            --danger-color: #D9534F;
        }

        body { font-family: sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        .main-container { display: flex; height: 100vh; }
        
        /* Sidebar Desktop */
        .sidebar { flex: 0 0 280px; background-color: var(--sidebar-color); padding: 20px; overflow-y: auto; border-right: 1px solid var(--border-color); transition: transform 0.3s ease; z-index: 2000; }
        .sidebar h2 { margin-top: 0; color: var(--primary-hover-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .filter-group { margin-bottom: 25px; }
        .filter-group h3 { margin-bottom: 10px; font-size: 1.1em; }
        .filter-group label { display: block; margin-bottom: 8px; cursor: pointer; padding: 4px; border-radius: 4px; }
        .filter-group label:hover { background-color: var(--surface-color); }
        .filter-group input { margin-right: 8px; }

        .content-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        .content-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; gap: 10px; }
        
        /* Botão Menu Mobile */
        #menuToggle { display: none; background: none; border: none; color: var(--text-color); font-size: 1.8em; cursor: pointer; padding: 0; }

        #openPopupBtn { background: none; border: none; font-size: 2em; color: var(--text-color); cursor: pointer; }
        #openPopupBtn:hover { color: var(--primary-hover-color); }
        
        .view-switcher { display: flex; gap: 5px; }
        .view-switcher button { padding: 8px 15px; font-size: 1em; cursor: pointer; border: 1px solid var(--primary-color); background-color: var(--surface-color); color: var(--text-color); border-radius: 5px; }
        .view-switcher button.active { background-color: var(--primary-color); color: white; }
        
        #timeline-container { flex-grow: 1; position: relative; }
        .message { text-align: center; color: #888; font-size: 1.2em; margin-top: 50px; }
        
        .edit-btn { position: absolute; top: 5px; right: 5px; background: none; border: none; color: #999; cursor: pointer; font-size: 1.1em; padding: 5px; }
        
        /* Cards */
        .list-view-card { background-color: var(--surface-color); border: 1px solid var(--border-color); border-left: 5px solid var(--primary-color); border-radius: 5px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; position: relative; }
        .list-view-card.type-pessoa { border-left-color: #4CAF50; }
        .list-view-card.type-evento { border-left-color: #FFC107; }
        .list-view-card.type-nação { border-left-color: #D9534F; }

        /* Timeline Line */
        .timeline-line { position: absolute; left: 50%; width: 3px; height: 100%; background-color: var(--border-color); transform: translateX(-50%); }
        .timeline-item { position: absolute; width: 42%; padding: 15px; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 1; }
        .timeline-item:nth-child(odd) { left: 0; }
        .timeline-item:nth-child(even) { left: 58%; }

        /* Popup */
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; align-items: center; z-index: 3000; visibility: hidden; opacity: 0; transition: opacity 0.3s; }
        .popup.active { visibility: visible; opacity: 1; }
        .popup-content { background: var(--surface-color); padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .popup-content form input, .popup-content form textarea, .popup-content form select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border-color); background-color: var(--bg-color); color: var(--text-color); border-radius: 4px; box-sizing: border-box; }
        .date-interval-group { display: flex; gap: 10px; align-items: center; }
        .popup-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .popup-actions button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .popup-actions .delete-btn { background-color: var(--danger-color); color: white; margin-right: auto; }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            #menuToggle { display: block; } /* Mostra as 3 barrinhas */
            
            .sidebar { 
                position: fixed; 
                left: 0; 
                top: 0; 
                bottom: 0; 
                transform: translateX(-100%); /* Esconde para a esquerda */
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }
            .sidebar.active { transform: translateX(0); } /* Desliza para dentro */

            .content-header h1 { font-size: 1.2em; flex-grow: 1; margin: 0 10px; }
            
            .timeline-line { left: 20px; transform: none; }
            .timeline-item { width: calc(100% - 70px); left: 50px !important; }
            .timeline-item::after { display: none; }

            .view-switcher button { padding: 6px 10px; font-size: 0.8em; }
        }
        #overlay.active {
    display: block !important;
}

/* Garanta que a sidebar tenha um z-index maior que o overlay */
.sidebar {
    z-index: 2000; /* Já estava assim, mas confirme */
}

    </style>
</head>
<body>
    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <h2>Filtros</h2>
            <div class="filter-group" id="date-filters"></div>
            <div class="filter-group" id="type-filters"></div>
            <div class="filter-group" id="subtype-filters"></div>
        </aside>

        <main class="content-area">
            <div class="content-header">
                <button id="menuToggle" title="Abrir Filtros">☰</button>
                <h1>Cronologia</h1>
                <div class="view-switcher">
                    <button id="listViewBtn" class="active">Lista</button>
                    <button id="timelineViewBtn">Linha</button>
                </div>
                <button id="openPopupBtn" title="Adicionar Novo Evento">⚙️</button>
            </div>
            <div id="timeline-container"></div>
        </main>
    </div>

    <!-- O Restante do HTML (Popup) permanece exatamente igual -->
    <div id="eventPopup" class="popup">
        <div class="popup-content">
            <h3 id="popupTitle">Adicionar Evento</h3>
            <form id="eventForm">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
                <label for="nota">Nota (opcional):</label>
                <textarea id="nota" name="nota" rows="3"></textarea>
                <label for="tipo">Tipo:</label>
                <select id="tipo" name="tipo">
                    <option value="pessoa">Pessoa</option>
                    <option value="evento">Evento</option>
                    <option value="nação">Nação</option>
                </select>
                <label for="subtipo">Subtipo (opcional):</label>
                <select id="subtipo" name="subtipo">
                    <option value="">Nenhum</option>
                    <option value="nascimento">Nascimento</option>
                    <option value="falecimento">Falecimento</option>
                    <option value="ungido">Ungido</option>
                </select>
                <label for="dataUnica">Data Única (a.C.) - opcional:</label>
                <input type="number" id="dataUnica" name="dataUnica">
                <label>Intervalo de Tempo (a.C.) - opcional:</label>
                <div class="date-interval-group">
                    <input type="number" id="intervaloInicio" name="intervaloInicio" placeholder="Início">
                    <span>-</span>
                    <input type="number" id="intervaloFim" name="intervaloFim" placeholder="Fim">
                </div>
                <div class="popup-actions">
                    <button type="button" id="deleteBtn" class="delete-btn" style="display: none;">Excluir</button>
                    <button type="button" id="cancelPopupBtn" class="cancel-btn">Cancelar</button>
                    <button type="submit" class="save-btn" style="background:#4CAF50; color:white;">Salvar</button>
                </div>
            </form>
        </div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1500; display:none;"></div>

    <script type="module">
        // [Firebase Config e Imports permanecem os mesmos]
        const firebaseConfig = {
            apiKey: "AIzaSyAhunMuQHzK-Mp8DaXb1bRFLGTem5GZfjY",
            authDomain: "bibliacontexto.firebaseapp.com",
            projectId: "bibliacontexto",
            storageBucket: "bibliacontexto.firebasestorage.app",
            messagingSenderId: "266293600679",
            appId: "1:266293600679:web:3b7c264f0b5e35ebea1682"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        let db;
        try { initializeApp(firebaseConfig); db = getFirestore(); } catch (e) { console.error(e); }
        
        let allEvents = [];
        let currentView = 'lista';
        let currentEditingId = null;
        
        const timelineContainer = document.getElementById('timeline-container');
        const openPopupBtn = document.getElementById('openPopupBtn');
        const eventPopup = document.getElementById('eventPopup');
        const popupTitle = document.getElementById('popupTitle');
        const cancelPopupBtn = document.getElementById('cancelPopupBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const eventForm = document.getElementById('eventForm');
        const listViewBtn = document.getElementById('listViewBtn');
        const timelineViewBtn = document.getElementById('timelineViewBtn');
        
        // Novos elementos para o Menu Mobile
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        const getIcons = () => ({ pessoa: '👤', evento: '📜', nação: '🏛️' });

        function buildTextParts(event) {
            const textParts = [];
            const subtipoText = event.subtipo ? ` (${event.subtipo.charAt(0).toUpperCase() + event.subtipo.slice(1)})` : '';
            textParts.push(`<strong>${event.nome}</strong>${subtipoText}`);
            const dateText = event.dataUnica ? `${event.dataUnica} a.C.` : `${event.intervaloInicio} - ${event.intervaloFim} a.C.`;
            textParts.push(dateText);
            if (event.nota) textParts.push(event.nota);
            return textParts.join(' - ');
        }

        function renderListView(events) {
            events.forEach(event => {
                const card = document.createElement('div');
                card.className = `list-view-card type-${event.tipo}`;
                const icons = getIcons();
                card.innerHTML = `<button class="edit-btn" data-id="${event.id}">✏️</button><span class="card-icon">${icons[event.tipo] || ''}</span><div class="card-text">${buildTextParts(event)}</div>`;
                timelineContainer.appendChild(card);
            });
        }
        
        function renderTimelineView(events) {
            const PIXELS_PER_YEAR = 2.5;
            const line = document.createElement('div');
            line.className = 'timeline-line';
            timelineContainer.appendChild(line);
            const years = events.flatMap(e => e.dataUnica || e.intervaloInicio).filter(Boolean);
            if (years.length === 0) return;
            const maxYear = Math.max(...years);
            const minYear = Math.min(...years);
            const yearSpan = maxYear - minYear;
            timelineContainer.style.height = `${(yearSpan * PIXELS_PER_YEAR) + 200}px`;
            events.forEach(event => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                const eventYear = event.dataUnica || event.intervaloInicio;
                const pixelTop = (maxYear - eventYear) * PIXELS_PER_YEAR;
                item.style.top = `${pixelTop}px`;
                const icons = getIcons();
                item.innerHTML = `<button class="edit-btn" data-id="${event.id}">✏️</button><div class="item-text"><span class="item-icon">${icons[event.tipo] || ''}</span>${buildTextParts(event)}</div>`;
                timelineContainer.appendChild(item);
            });
        }

        function renderContent(events) {
            timelineContainer.innerHTML = '';
            timelineContainer.style.height = 'auto';
            if (events.length === 0) {
                timelineContainer.innerHTML = '<p class="message">Nenhum evento encontrado.</p>';
                return;
            }
            (currentView === 'lista' ? renderListView : renderTimelineView)(events);
        }

      function setupEventListeners() {
    const overlay = document.getElementById('overlay'); // Captura o overlay

    // Abrir/Fechar ao clicar nas 3 barrinhas
    menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active'); // Liga/Desliga o fundo escuro
    });

    // FECHAR AO CLICAR FORA (No overlay)
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    });

    // Fecha ao clicar em um filtro (opcional)
    sidebar.addEventListener('click', (e) => {
        if(e.target.tagName === 'INPUT' && window.innerWidth <= 768) {
            setTimeout(() => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }, 300);
        }
    });

    // --- Restante dos eventos (OpenPopup, Save, etc) ---
    openPopupBtn.addEventListener('click', () => showPopup());
    cancelPopupBtn.addEventListener('click', hidePopup);
    deleteBtn.addEventListener('click', handleDelete);
    eventForm.addEventListener('submit', handleFormSubmit);
    timelineContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('.edit-btn');
        if (btn) showPopup(btn.dataset.id);
    });
    listViewBtn.addEventListener('click', () => { 
        currentView = 'lista'; 
        listViewBtn.classList.add('active'); 
        timelineViewBtn.classList.remove('active'); 
        applyFiltersAndRender(); 
    });
    timelineViewBtn.addEventListener('click', () => { 
        currentView = 'linha'; 
        timelineViewBtn.classList.add('active'); 
        listViewBtn.classList.remove('active'); 
        applyFiltersAndRender(); 
    });
}

        // [As demais funções: showPopup, hidePopup, handleFormSubmit, handleDelete, applyFiltersAndRender, fetchAndRenderEvents, setupFilters permanecem iguais]
        
        function showPopup(eventId = null) {
            eventForm.reset();
            if (eventId) {
                currentEditingId = eventId;
                const event = allEvents.find(e => e.id === eventId);
                document.getElementById('nome').value = event.nome;
                document.getElementById('nota').value = event.nota;
                document.getElementById('tipo').value = event.tipo;
                document.getElementById('subtipo').value = event.subtipo;
                document.getElementById('dataUnica').value = event.dataUnica;
                document.getElementById('intervaloInicio').value = event.intervaloInicio;
                document.getElementById('intervaloFim').value = event.intervaloFim;
                deleteBtn.style.display = 'block';
            } else {
                currentEditingId = null;
                deleteBtn.style.display = 'none';
            }
            eventPopup.classList.add('active');
        }

        function hidePopup() { eventPopup.classList.remove('active'); }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(eventForm);
            const data = {
                nome: formData.get('nome'), nota: formData.get('nota'), tipo: formData.get('tipo'), subtipo: formData.get('subtipo'),
                dataUnica: formData.get('dataUnica') ? parseInt(formData.get('dataUnica')) : null,
                intervaloInicio: formData.get('intervaloInicio') ? parseInt(formData.get('intervaloInicio')) : null,
                intervaloFim: formData.get('intervaloFim') ? parseInt(formData.get('intervaloFim')) : null
            };
            try {
                currentEditingId ? await updateDoc(doc(db, "cronos", currentEditingId), data) : await addDoc(collection(db, "cronos"), data);
                hidePopup(); fetchAndRenderEvents();
            } catch (err) { console.error(err); }
        }

        async function handleDelete() {
            if (confirm("Excluir?") && currentEditingId) {
                await deleteDoc(doc(db, "cronos", currentEditingId));
                hidePopup(); fetchAndRenderEvents();
            }
        }

        function applyFiltersAndRender() {
            const selDates = Array.from(document.querySelectorAll('input[name="date_filter"]:checked')).map(cb => cb.value);
            const selTypes = Array.from(document.querySelectorAll('input[name="type_filter"]:checked')).map(cb => cb.value);
            const selSubs = Array.from(document.querySelectorAll('input[name="subtype_filter"]:checked')).map(cb => cb.value);
            let filtered = allEvents.filter(e => {
                const year = e.dataUnica || e.intervaloInicio;
                const dateMatch = selDates.length === 0 || selDates.some(r => year >= r.split('-')[1] && year <= r.split('-')[0]);
                const typeMatch = selTypes.length === 0 || selTypes.includes(e.tipo);
                const subMatch = selSubs.length === 0 || selSubs.includes(e.subtipo);
                return dateMatch && typeMatch && subMatch;
            });
            filtered.sort((a, b) => (b.dataUnica || b.intervaloInicio) - (a.dataUnica || a.intervaloInicio));
            renderContent(filtered);
        }

        async function fetchAndRenderEvents() {
            const snapshot = await getDocs(collection(db, "cronos"));
            allEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            applyFiltersAndRender();
        }

     function setupFilters() {
    const icons = getIcons();

    // Filtros de Data
    const ranges = [{s:4000, e:3500}, {s:3500, e:3000}, {s:3000, e:2500}, {s:2500, e:2000}, {s:2000, e:1500}, {s:1500, e:1000}, {s:1000, e:500}, {s:500, e:1}];
    const dFC = document.getElementById('date-filters');
    dFC.innerHTML = '<h3>Período (a.C.)</h3>';
    ranges.forEach(r => {
        dFC.innerHTML += `<label><input type="checkbox" name="date_filter" value="${r.s}-${r.e}"> ${r.s} - ${r.e}</label>`;
    });
    
    // Filtros de Tipo (COM EMOJIS)
    const tFC = document.getElementById('type-filters');
    tFC.innerHTML = '<h3>Tipo</h3>';
    ['pessoa', 'evento', 'nação'].forEach(t => {
        tFC.innerHTML += `<label><input type="checkbox" name="type_filter" value="${t}"> ${icons[t]} ${t.charAt(0).toUpperCase() + t.slice(1)}</label>`;
    });

    // Filtros de Subtipo
    const sFC = document.getElementById('subtype-filters');
    sFC.innerHTML = '<h3>Subtipo</h3>';
    const subLabels = { nascimento: 'Nascimento', falecimento: 'Falecimento', ungido: 'Ungido' };
    Object.entries(subLabels).forEach(([value, text]) => {
        sFC.innerHTML += `<label><input type="checkbox" name="subtype_filter" value="${value}"> ${text}</label>`;
    });

    // Re-adicionar ouvintes de evento
    document.querySelectorAll('input[type="checkbox"]').forEach(i => i.addEventListener('change', applyFiltersAndRender));
}

        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            setupFilters();
            fetchAndRenderEvents();
        });
    </script>
</body>
</html>
