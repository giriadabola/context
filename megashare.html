<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atril - Visualizador JSON</title>
    <style>
        :root { color-scheme: dark light; }
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            min-height: 100vh;
        }
        #container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            position: relative;
            box-sizing: border-box;
        }
        #selected-doc-title {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #e0e0e0;
            border-bottom: 2px solid #3a7ca5;
            padding-bottom: 15px;
            font-weight: bold;
        }

        #font-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: #888;
            font-size: 0.9em;
        }
        .font-btn {
            background: #333;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .font-btn:hover { background: #444; }

        #selected-doc-body {
            font-size: 17px;
        }
        #selected-doc-body p {
            margin-top: 0;
            margin-bottom: 12px; 
            line-height: 1.8;
            font-size: 1em;
            text-align: justify;
        }

        /* --- ESTILO DO SUBTEMA COM GAP VISUAL AUMENTADO --- */
        .atril-subheading {
            display: block;
            font-size: 1.4em;
            font-weight: bold;
            color: #e0e0e0;
            margin-top: 45px;    /* Espaço maior para separar do parágrafo anterior */
            margin-bottom: 12px;  /* Espaço normal para o texto seguinte */
            text-align: left;
            border-left: 5px solid #3a7ca5;
            padding-left: 15px;
            line-height: 1.3;
        }

        sup.ref-marker-popup {
            cursor: pointer;
            color: #7aa0c7;
            font-size: 0.8em;
            font-weight: bold;
            background: rgba(58, 124, 165, 0.1);
            padding: 0 4px;
            border-radius: 3px;
            margin: 0 2px;
            display: inline-block;
            vertical-align: super;
        }

        #referencePopup {
            position: absolute;
            display: none;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
            padding: 15px;
            width: 320px;
            font-size: 0.95em;
            box-sizing: border-box;
            overflow-wrap: break-word;
        }
        #referencePopupTitle { font-weight: bold; margin-bottom: 10px; color: #b0c4de; border-bottom: 1px solid #444; padding-bottom: 8px; }
        #referencePopupUrls a {
            display: block;
            color: #87cefa;
            text-decoration: none;
            margin-top: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dotted #555;
            word-break: break-all;
            line-height: 1.4;
        }
        #referencePopupUrls a:last-child { border-bottom: none; }

        #selected-doc-references-container {
            margin-top: 50px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
        #selected-doc-references-list { list-style: none; padding: 0; }
        #selected-doc-references-list li {
            background: #252525;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            overflow-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="selected-doc-title">Carregando...</h1>
        
        <div id="font-controls">
            <span>Tamanho do texto:</span>
            <button class="font-btn" id="decFont">A -</button>
            <span id="fontPercent">100%</span>
            <button class="font-btn" id="incFont">A +</button>
        </div>

        <div id="selected-doc-body"></div>
        
        <div id="selected-doc-references-container" style="display:none;">
            <h3>Referências</h3>
            <ul id="selected-doc-references-list"></ul>
        </div>

        <div id="referencePopup">
            <div id="referencePopupTitle"></div>
            <div id="referencePopupUrls"></div>
        </div>
    </div>

    <script>
        const bodyEl = document.getElementById('selected-doc-body');
        const containerEl = document.getElementById('container');
        const refPopup = document.getElementById('referencePopup');
        let referencesMap = {};
        
        let baseFontSize = 17;
        let currentPercent = 100;

        document.getElementById('incFont').onclick = () => {
            if (currentPercent < 200) { currentPercent += 10; updateFontSize(); }
        };
        document.getElementById('decFont').onclick = () => {
            if (currentPercent > 70) { currentPercent -= 10; updateFontSize(); }
        };

        function updateFontSize() {
            bodyEl.style.fontSize = (baseFontSize * (currentPercent / 100)) + 'px';
            document.getElementById('fontPercent').textContent = currentPercent + '%';
        }

        async function loadLocalJson() {
            try {
                const response = await fetch('js/ep1.json');
                const data = await response.json();
                renderDocument(data);
            } catch (error) {
                document.getElementById('selected-doc-title').textContent = "Erro ao carregar js/ep1.json";
            }
        }

        function renderDocument(data) {
            document.getElementById('selected-doc-title').textContent = data.titulo;
            data.referencias.forEach(ref => { referencesMap[ref.numero] = ref; });

            const lines = data.corpo.split('\n');
            const processedHtml = lines.map(line => {
                const trimmed = line.trim();
                if (!trimmed) return ""; 
                if (trimmed.length > 4 && trimmed === trimmed.toUpperCase() && /[A-ZÀ-Ú]/.test(trimmed)) {
                    return `<div class="atril-subheading">${trimmed}</div>`;
                }
                const content = trimmed.replace(/\[(\d+)\]/g, (match, numero) => {
                    return `<sup class="ref-marker-popup" data-ref-num="${numero}">[${numero}]</sup>`;
                });
                return `<p>${content}</p>`;
            }).filter(html => html !== "").join('');

            bodyEl.innerHTML = processedHtml;

            if (data.referencias && data.referencias.length > 0) {
                const listContainer = document.getElementById('selected-doc-references-container');
                const listUl = document.getElementById('selected-doc-references-list');
                listContainer.style.display = 'block';
                data.referencias.forEach(ref => {
                    const li = document.createElement('li');
                    let urlsHtml = ref.links.map(link => `<div><a href="${link}" target="_blank" style="color:#87cefa; text-decoration:none; word-break: break-all;">${link}</a></div>`).join('');
                    li.innerHTML = `<span style="color:#3a7ca5; font-weight:bold;">[${ref.numero}]</span> <strong>${ref.titulo}</strong><div style="margin-top:8px;">${urlsHtml}</div>`;
                    listUl.appendChild(li);
                });
            }
        }

        document.addEventListener('click', (e) => {
            const marker = e.target.closest('.ref-marker-popup');
            if (marker) {
                const num = marker.dataset.refNum;
                const ref = referencesMap[num];
                if (ref) {
                    document.getElementById('referencePopupTitle').textContent = `[${ref.numero}] ${ref.titulo}`;
                    document.getElementById('referencePopupUrls').innerHTML = ref.links.map(l => `<a href="${l}" target="_blank" style="color:#87cefa; text-decoration:none; display:block; margin-top:5px;">${l}</a>`).join('');
                    refPopup.style.display = 'block';
                    const popupWidth = refPopup.offsetWidth;
                    const popupHeight = refPopup.offsetHeight;
                    const markerRect = marker.getBoundingClientRect();
                    const containerRect = containerEl.getBoundingClientRect();
                    let left = markerRect.left - containerRect.left;
                    if (left + popupWidth > containerRect.width - 20) { left = containerRect.width - popupWidth - 20; }
                    if (left < 20) left = 20;
                    let top = markerRect.bottom - containerRect.top + 10;
                    if (markerRect.bottom + popupHeight + 20 > window.innerHeight) { top = (markerRect.top - containerRect.top) - popupHeight - 10; }
                    refPopup.style.left = left + 'px';
                    refPopup.style.top = top + 'px';
                }
            } else if (!e.target.closest('#referencePopup')) { refPopup.style.display = 'none'; }
        });

        loadLocalJson();
    </script>
</body>
</html>
