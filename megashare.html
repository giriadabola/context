<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atril - Visualizador JSON</title>
    <style>
        :root { color-scheme: dark light; }
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            min-height: 100vh;
        }
        #container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            position: relative;
        }
        #selected-doc-title {
            font-size: 2.2em;
            margin-bottom: 25px;
            color: #e0e0e0;
            border-bottom: 2px solid #3a7ca5;
            padding-bottom: 15px;
        }
        #selected-doc-body {
            line-height: 1.8;
            font-size: 17px;
            margin-bottom: 40px;
            text-align: justify;
            white-space: pre-wrap; /* Mantém as quebras de linha do JSON */
        }
        
        /* Estilo para Subtítulos detetados automaticamente */
        .atril-subheading {
            display: block;
            font-size: 1.3em;
            font-weight: bold;
            color: #3a7ca5;
            margin-top: 30px;
            margin-bottom: 10px;
            text-align: left;
        }

        /* Estilo para os Marcadores [n] transformados em botões */
        sup.ref-marker-popup {
            cursor: pointer;
            color: #7aa0c7;
            font-size: 0.85em;
            font-weight: bold;
            background: rgba(58, 124, 165, 0.1);
            padding: 0 4px;
            border-radius: 3px;
            margin: 0 2px;
            transition: background 0.2s;
        }
        sup.ref-marker-popup:hover {
            background: rgba(58, 124, 165, 0.3);
            color: #fff;
        }

        #referencePopup {
            position: absolute;
            display: none;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
            padding: 15px;
            width: 300px;
            font-size: 0.9em;
        }
        #referencePopupTitle { font-weight: bold; margin-bottom: 8px; color: #b0c4de; }
        #referencePopupUrls a {
            display: block;
            color: #87cefa;
            text-decoration: none;
            margin-top: 8px;
            word-break: break-all;
            border-bottom: 1px dotted #444;
            padding-bottom: 4px;
        }

        #selected-doc-references-container {
            margin-top: 50px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
        #selected-doc-references-list { list-style: none; padding: 0; }
        #selected-doc-references-list li {
            background: #252525;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .ref-num-list { color: #3a7ca5; font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="selected-doc-title">Carregando...</h1>
        <div id="selected-doc-body"></div>
        
        <div id="selected-doc-references-container" style="display:none;">
            <h3>Referências</h3>
            <ul id="selected-doc-references-list"></ul>
        </div>

        <div id="referencePopup">
            <div id="referencePopupTitle"></div>
            <div id="referencePopupUrls"></div>
        </div>
    </div>

    <script>
        const bodyEl = document.getElementById('selected-doc-body');
        const refPopup = document.getElementById('referencePopup');
        let referencesMap = {};

        async function loadLocalJson() {
            try {
                // PUXA O ARQUIVO ESPECIFICADO
                const response = await fetch('js/ep1.json');
                const data = await response.json();
                renderDocument(data);
            } catch (error) {
                console.error("Erro ao carregar o JSON:", error);
                document.getElementById('selected-doc-title').textContent = "Erro ao carregar js/ep1.json";
            }
        }

        function renderDocument(data) {
            document.getElementById('selected-doc-title').textContent = data.titulo;
            
            // 1. Mapeia as referências para busca rápida
            data.referencias.forEach(ref => {
                referencesMap[ref.numero] = ref;
            });

            // 2. Processa o corpo do texto
            let texto = data.corpo;

            // Transforma padrões [n] em elementos HTML clicáveis
            // O Regex procura por colchetes com números: [1], [22], etc.
            texto = texto.replace(/\[(\d+)\]/g, (match, numero) => {
                return `<sup class="ref-marker-popup" data-ref-num="${numero}">[${numero}]</sup>`;
            });

            bodyEl.innerHTML = texto;

            // 3. Deteta Subtítulos (Linhas em CAPS LOCK)
            // Como usamos white-space: pre-wrap, vamos processar os nós de texto
            const lines = bodyEl.innerHTML.split('\n');
            const processedLines = lines.map(line => {
                const trimmed = line.trim();
                // Se a linha for toda maiúscula e tiver mais de 4 caracteres
                if (trimmed.length > 4 && trimmed === trimmed.toUpperCase() && /[A-Z]/.test(trimmed)) {
                    return `<span class="atril-subheading">${trimmed}</span>`;
                }
                return line;
            });
            bodyEl.innerHTML = processedLines.join('\n');

            // 4. Renderiza a lista de referências ao final
            if (data.referencias && data.referencias.length > 0) {
                const listContainer = document.getElementById('selected-doc-references-container');
                const listUl = document.getElementById('selected-doc-references-list');
                listContainer.style.display = 'block';
                
                data.referencias.forEach(ref => {
                    const li = document.createElement('li');
                    let urlsHtml = ref.links.map(link => `<div><a href="${link}" target="_blank" style="color:#87cefa; text-decoration:none; font-size:0.9em;">${link}</a></div>`).join('');
                    li.innerHTML = `<span class="ref-num-list">[${ref.numero}]</span> <strong>${ref.titulo}</strong><div style="margin-top:8px;">${urlsHtml}</div>`;
                    listUl.appendChild(li);
                });
            }
        }

        // Evento para abrir o Popup ao clicar no [n]
        document.addEventListener('click', (e) => {
            const marker = e.target.closest('.ref-marker-popup');
            if (marker) {
                const num = marker.dataset.refNum;
                const ref = referencesMap[num];
                
                if (ref) {
                    document.getElementById('referencePopupTitle').textContent = `[${ref.numero}] ${ref.titulo}`;
                    document.getElementById('referencePopupUrls').innerHTML = ref.links.map(l => `<a href="${l}" target="_blank">${l}</a>`).join('');
                    
                    refPopup.style.display = 'block';
                    
                    // Posicionamento básico do popup
                    const rect = marker.getBoundingClientRect();
                    refPopup.style.top = (window.scrollY + rect.bottom + 10) + 'px';
                    refPopup.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
                }
            } else if (!e.target.closest('#referencePopup')) {
                refPopup.style.display = 'none';
            }
        });

        loadLocalJson();
    </script>
</body>
</html>
