<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio: Music</title>
    <style>
        :root {
            color-scheme: dark light;
        }
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .main-container {
            position: relative;
            padding: 20px;
        }
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            background: none;
            border: 1px solid #555;
            color: #c0c0c0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 100;
        }
        #settingsBtn:hover {
            background-color: #333;
            border-color: #777;
        }
        .content-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 50px;
        }
        #collectionsNav {
            flex-basis: 25%;
            max-width: 250px;
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            height: calc(100vh - 100px);
            overflow-y: auto;
        }
        #collectionsNav h2, #tracksDisplay h2 {
            margin-top: 0;
            color: #e0e0e0;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        #collectionsNav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #collectionsNav li {
            padding: 10px 8px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        #collectionsNav li:hover {
            background-color: #3a3a3a;
        }
        #collectionsNav li.active {
            background-color: #3a7ca5;
            color: white;
            font-weight: bold;
        }
        #tracksDisplay {
            flex-grow: 1;
        }
        #tracksList {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }
        #tracksList .track-item {
            background-color: #2d2d2d;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 15px;
        }
        .track-item h3 {
            margin-top: 0;
            color: #b0c4de;
        }
        .track-item .video-container {
            width: 100%;
            max-width: 480px;
            margin: 15px 0;
        }
        .track-item iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 4px;
        }
        .track-item .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .track-item .tags-list span {
            background-color: #384858;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.9em;
            color: #a8c8e8;
        }
        .track-item p {
            margin: 5px 0;
            color: #aaa;
        }
        .track-item a {
             color: #7aa0c7;
        }
        .clickable-tag {
            cursor: pointer;
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .clickable-tag:hover {
            background-color: #3a7ca5;
            color: white;
        }
        #tracksDisplay h2 .tag-highlight {
            color: #7aa0c7;
            background-color: #2d2d2d;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1001; visibility: hidden; opacity: 0; transition: opacity 0.3s ease, visibility 0s linear 0.3s; }
        .popup.active { visibility: visible; opacity: 1; transition: opacity 0.3s ease; }
        .popup-content { background: #333; color: #d4d4d4; padding: 25px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.6); width: 550px; max-height: 90vh; display: flex; flex-direction: column; overflow-y: auto; }
        .popup-content h3 { margin-top: 20px; margin-bottom: 10px; color: #e0e0e0; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .popup-content h3:first-of-type { margin-top: 0; }
        .popup-content input[type="text"], .popup-content input[type="url"], .popup-content input[type="number"], .popup-content select { width: calc(100% - 22px); padding: 10px; margin-bottom: 15px; border: 1px solid #555; border-radius: 4px; background-color: #252525; color: #d4d4d4 !important; }
        .popup-content button { padding: 10px 15px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; background-color: #3a7ca5; color: white; }
        .popup-content button:hover { background-color: #4a90c2; }
        .close-popup-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5em; background: none !important; border: none !important; color: #aaa; padding: 0 !important; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #bbb; }
        .popup-tabs {
            display: flex;
            border-bottom: 1px solid #555;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            cursor: pointer;
            background: none;
            border: none;
            color: #bbb;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
            font-size: 1em;
        }
        .tab-btn:hover {
            background-color: #3f3f3f;
            color: #fff;
        }
        .tab-btn.active {
            color: #d4d4d4;
            font-weight: bold;
            border-bottom-color: #3a7ca5;
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
        .tab-panel > h3 {
            display: none;
        }
        
        /* --- NEW: STYLES FOR DIFFERENTIATING FORM SECTIONS --- */
        .form-group-collections, .form-group-tags {
            padding: 15px;
            border-radius: 6px;
        }
        .form-group-collections {
            background-color: rgba(77, 182, 172, 0.1);
            border-left: 4px solid #4db6ac;
        }
        .form-group-tags {
            background-color: rgba(186, 104, 200, 0.1);
            border-left: 4px solid #ba68c8;
        }
        
        .search-select-container {
            position: relative;
        }
        .selected-items-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background-color: #252525;
            border: 1px solid #555;
            border-radius: 4px;
            min-height: 38px;
            margin-top: 10px;
        }
        .selected-item {
            background-color: #3a7ca5;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
        }
        .selected-item .remove-item-btn {
            margin-left: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #e0e0e0;
        }
        .search-results {
            position: absolute;
            background: #444;
            border: 1px solid #666;
            border-radius: 4px;
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            z-index: 1002;
        }
        .search-results div {
            padding: 8px 12px;
            cursor: pointer;
        }
        .search-results div:hover {
            background-color: #555;
        }

        /* Ajuste no link de voltar */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #7aa0c7;
            text-decoration: none;
            z-index: 101;
        }

        /* Botão Hamburger (Escondido por padrão) */
        .mobile-menu-btn {
            display: none;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 90;
        }

        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; } /* Mostra o botão no mobile */
            .back-link { font-size: 0.8em; top: 25px; } /* Ajusta o link voltar */
            
            #settingsBtn { width: 35px; height: 35px; top: 15px; right: 15px; }

            .content-wrapper {
                flex-direction: column;
                margin-top: 60px;
            }

            /* Sidebar vira um Drawer (Menu Lateral) */
            #collectionsNav {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 260px;
                z-index: 2000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                border-radius: 0;
                height: 100vh;
                max-width: 80%;
            }

            #collectionsNav.active {
                transform: translateX(0);
            }

            #overlay.active {
                display: block !important;
            }

            /* Grid de faixas vira 1 coluna */
            #tracksList {
                grid-template-columns: 1fr;
            }

            .track-item .video-container {
                max-width: 100%;
            }

            /* Popup ajustado */
            .popup-content {
                width: 95%;
                padding: 15px;
            }
            
            .popup-tabs {
                overflow-x: auto;
                white-space: nowrap;
            }
            
            .tab-btn {
                padding: 10px 10px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            .content-wrapper { margin-top: 80px; }
            .mobile-menu-btn { top: 60px; width: 90%; }
        }

    </style>
</head>
<body>

      <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1500; display:none;"></div>

   <div class="main-container">
        <!-- BOTÃO VOLTAR (Ajustado para mobile) -->
        <a href="index.html" class="back-link">Voltar ao Editor</a>
        
        <!-- NOVO: Botão Hamburger para Mobile -->
        <button id="menuToggle" class="mobile-menu-btn">☰ Coleções</button>
        
        <button id="settingsBtn" title="Configurações e Criação">⚙️</button>

        <div class="content-wrapper">
            <aside id="collectionsNav">
                <h2>Coleções</h2>
                <ul id="collectionsList"></ul>
            </aside>
            <main id="tracksDisplay">
                <h2>Faixas</h2>
                <div id="tracksList">
                    <p>Selecione uma coleção à esquerda para ver as faixas.</p>
                </div>
            </main>
        </div>
    </div>

    <div id="settingsPopup" class="popup">
        <div class="popup-content">
            <button class="close-popup-btn" title="Fechar">×</button>

            <div class="popup-tabs">
                <button class="tab-btn" data-tab="createCollectionForm">Criar Coleção</button>
                <button class="tab-btn" data-tab="createTagForm">Criar Tag</button>
                <button class="tab-btn active" data-tab="createTrackForm">Criar Faixa</button>
            </div>

            <div class="popup-tab-content">
                <div id="createCollectionForm" class="tab-panel">
                    <h3>Criar Nova Coleção</h3>
                    <input type="text" id="newCollectionInput" placeholder="Nome da Coleção (ex: Épica, Calma)">
                    <button id="saveCollectionBtn">Salvar Coleção</button>
                </div>
                <div id="createTagForm" class="tab-panel">
                    <h3>Criar Nova Tag</h3>
                    <input type="text" id="newTagInput" placeholder="Nome da Tag (ex: Batalha, Suspense)">
                    <button id="saveTagBtn">Salvar Tag</button>
                </div>
                <div id="createTrackForm" class="tab-panel active">
                    <h3>Adicionar Nova Faixa</h3>
                    <div class="form-group">
                        <label for="trackDescriptionInput">Breve Descrição</label>
                        <input type="text" id="trackDescriptionInput" placeholder="Ex: Música de fundo para perseguição">
                    </div>
                    <div class="form-group">
                        <label for="trackUrlInput">Link do YouTube</label>
                        <input type="url" id="trackUrlInput" placeholder="Cole o link do vídeo aqui">
                    </div>
                    <div class="form-group">
                        <label for="trackDurationCategoryInput">Duração (Categoria)</label>
                        <select id="trackDurationCategoryInput">
                            <option value="Breve">Breve (até 2 min)</option>
                            <option value="Médio">Médio (2 a 5 min)</option>
                            <option value="Longo">Longo (mais de 5 min)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="trackDurationMinutesInput">Duração Exata (minutos)</label>
                        <input type="number" id="trackDurationMinutesInput" placeholder="Ex: 3">
                    </div>
                    <div class="form-group form-group-collections">
                        <label for="trackCollectionsSearchInput">Adicionar a Coleções</label>
                        <div class="search-select-container">
                             <input type="text" id="trackCollectionsSearchInput" placeholder="Pesquisar coleções...">
                             <div class="search-results" id="collectionSearchResults"></div>
                        </div>
                        <div class="selected-items-list" id="selectedCollectionsList"></div>
                    </div>
                    <div class="form-group form-group-tags">
                        <label for="trackTagsSearchInput">Adicionar Tags</label>
                        <div class="search-select-container">
                            <input type="text" id="trackTagsSearchInput" placeholder="Pesquisar tags...">
                            <div class="search-results" id="tagSearchResults"></div>
                        </div>
                        <div class="selected-items-list" id="selectedTagsList"></div>
                    </div>
                    <button id="saveTrackBtn">Salvar Faixa</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
          apiKey: "AIzaSyAhunMuQHzK-Mp8DaXb1bRFLGTem5GZfjY",
          authDomain: "bibliacontexto.firebaseapp.com",
          projectId: "bibliacontexto",
          storageBucket: "bibliacontexto.firebasestorage.app",
          messagingSenderId: "266293600679",
          appId: "1:266293600679:web:3b7c264f0b5e35ebea1682"
        };
    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore, doc, setDoc, getDocs, collection, query, where, serverTimestamp, addDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log("Firebase inicializado com sucesso!");
        } catch (error) {
            console.error("Erro ao inicializar Firebase:", error);
        }

        // Elementos da Interface
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPopup = document.getElementById('settingsPopup');
        const collectionsListUl = document.getElementById('collectionsList');
        const tracksListDiv = document.getElementById('tracksList');
        const closePopupBtn = settingsPopup.querySelector('.close-popup-btn');
        
        // Elementos Mobile e Overlay
        const menuToggle = document.getElementById('menuToggle');
        const collectionsNav = document.getElementById('collectionsNav');
        const overlay = document.getElementById('overlay');

        // Inputs e Botões de Criação
        const newCollectionInput = document.getElementById('newCollectionInput');
        const saveCollectionBtn = document.getElementById('saveCollectionBtn');
        const newTagInput = document.getElementById('newTagInput');
        const saveTagBtn = document.getElementById('saveTagBtn');
        const trackDescriptionInput = document.getElementById('trackDescriptionInput');
        const trackUrlInput = document.getElementById('trackUrlInput');
        const trackDurationCategoryInput = document.getElementById('trackDurationCategoryInput');
        const trackDurationMinutesInput = document.getElementById('trackDurationMinutesInput');
        const trackCollectionsSearchInput = document.getElementById('trackCollectionsSearchInput');
        const collectionSearchResultsDiv = document.getElementById('collectionSearchResults');
        const selectedCollectionsListDiv = document.getElementById('selectedCollectionsList');
        const trackTagsSearchInput = document.getElementById('trackTagsSearchInput');
        const tagSearchResultsDiv = document.getElementById('tagSearchResults');
        const selectedTagsListDiv = document.getElementById('selectedTagsList');
        const saveTrackBtn = document.getElementById('saveTrackBtn');

        let selectedCollectionsForNewTrack = new Set();
        let selectedTagsForNewTrack = new Set();
        let allCollections = [];
        let allTags = [];

        // Funções de Utilidade
        function showPopup() { settingsPopup.classList.add('active'); }
        function hidePopup() { settingsPopup.classList.remove('active'); }
        function escapeHTML(str) { if (typeof str !== 'string') return ''; const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&apos;', '`': '&#96;' }; return str.replace(/[&<>"'`]/g, (tag) => map[tag] || tag); }
        function getYouTubeVideoId(url) { if (!url) return null; const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; }

        // --- LÓGICA FIREBASE: SALVAR ---
        async function saveNewItem(type, inputElement) { 
            const name = inputElement.value.trim(); 
            if (!name) return; 
            try { 
                await addDoc(collection(db, "instrumental"), { nome: name, tipo: type, criadoEm: serverTimestamp() }); 
                alert("Salvo com sucesso!"); 
                inputElement.value = ''; 
                type === 'colecao' ? loadCollectionsNav() : loadAllTags(); 
            } catch (e) { console.error(e); } 
        }

        async function saveNewTrack() { 
            const descricao = trackDescriptionInput.value.trim(); 
            const youtubeUrl = trackUrlInput.value.trim(); 
            const colecoes = Array.from(selectedCollectionsForNewTrack); 
            if (!descricao || !youtubeUrl || colecoes.length === 0) { alert("Preencha descrição, link e coleção."); return; } 
            try { 
                await addDoc(collection(db, "instrumental"), { 
                    tipo: 'faixa', descricao, youtubeUrl, 
                    duracaoCategoria: trackDurationCategoryInput.value, 
                    duracaoMinutos: Number(trackDurationMinutesInput.value) || 0, 
                    colecoes, tags: Array.from(selectedTagsForNewTrack), 
                    criadoEm: serverTimestamp() 
                }); 
                alert("Faixa salva!"); 
                hidePopup(); 
            } catch(e) { console.error(e); } 
        }

        // --- LÓGICA FIREBASE: CARREGAR ---
        async function loadCollectionsNav() { 
            collectionsListUl.innerHTML = '<li>Carregando...</li>'; 
            allCollections = []; 
            const q = query(collection(db, "instrumental"), where("tipo", "==", "colecao")); 
            const snap = await getDocs(q); 
            collectionsListUl.innerHTML = ''; 
            snap.forEach(doc => { 
                const data = doc.data(); 
                allCollections.push(data.nome); 
                const li = document.createElement('li'); 
                li.textContent = data.nome; 
                li.onclick = () => { 
                    document.querySelectorAll('#collectionsList li').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    loadTracksForCollection(data.nome);
                    // Fechar menu no mobile ao clicar
                    if (window.innerWidth <= 768) { collectionsNav.classList.remove('active'); overlay.classList.remove('active'); }
                };
                collectionsListUl.appendChild(li); 
            }); 
        }

        async function loadAllTags() { 
            allTags = []; 
            const q = query(collection(db, "instrumental"), where("tipo", "==", "tag")); 
            const snap = await getDocs(q); 
            snap.forEach(doc => allTags.push(doc.data().nome)); 
        }

        async function loadTracksForCollection(colName) { 
            tracksListDiv.innerHTML = '<p>Carregando...</p>'; 
            const q = query(collection(db, "instrumental"), where("tipo", "==", "faixa"), where("colecoes", "array-contains", colName)); 
            const snap = await getDocs(q); 
            tracksListDiv.innerHTML = snap.empty ? '<p>Vazio.</p>' : ''; 
            snap.forEach(doc => tracksListDiv.appendChild(createTrackElement(doc.data()))); 
        }

        async function loadTracksByTag(tagName) {
            document.querySelector('#tracksDisplay h2').innerHTML = `Tag: <span class="tag-highlight">${tagName}</span>`;
            const q = query(collection(db, "instrumental"), where("tipo", "==", "faixa"), where("tags", "array-contains", tagName));
            const snap = await getDocs(q);
            tracksListDiv.innerHTML = snap.empty ? '<p>Nenhuma faixa encontrada.</p>' : '';
            snap.forEach(doc => tracksListDiv.appendChild(createTrackElement(doc.data())));
        }

        function createTrackElement(data) { 
            const videoId = getYouTubeVideoId(data.youtubeUrl); 
            const div = document.createElement('div'); 
            div.className = 'track-item'; 
            const tagsHTML = data.tags ? data.tags.map(t => `<span class="clickable-tag" data-tag="${escapeHTML(t)}">${escapeHTML(t)}</span>`).join('') : ''; 
            div.innerHTML = `<h3>${escapeHTML(data.descricao)}</h3> ${videoId ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>` : ''} <div class="tags-list">${tagsHTML}</div>`; 
            return div; 
        }

        // --- EVENTOS E BUSCA ---
        function handleSearch(type, term, resDiv) { 
            const lower = term.toLowerCase(); 
            resDiv.innerHTML = ''; 
            if (!lower) { resDiv.style.display = 'none'; return; } 
            const source = type === 'colecao' ? allCollections : allTags; 
            const selected = type === 'colecao' ? selectedCollectionsForNewTrack : selectedTagsForNewTrack; 
            const filtered = source.filter(n => n.toLowerCase().includes(lower) && !selected.has(n)); 
            filtered.forEach(n => { 
                const d = document.createElement('div'); 
                d.textContent = n; 
                d.onclick = () => { selected.add(n); renderSelectedItems(type); resDiv.style.display='none'; (type==='colecao'?trackCollectionsSearchInput:trackTagsSearchInput).value=''; }; 
                resDiv.appendChild(d); 
            }); 
            resDiv.style.display = filtered.length ? 'block' : 'none'; 
        }

        function renderSelectedItems(type) { 
            const div = type === 'colecao' ? selectedCollectionsListDiv : selectedTagsListDiv; 
            const set = type === 'colecao' ? selectedCollectionsForNewTrack : selectedTagsForNewTrack; 
            div.innerHTML = ''; 
            set.forEach(n => { 
                const s = document.createElement('span'); s.className = 'selected-item'; s.innerHTML = `${n} <span class="remove-item-btn" onclick="this.parentElement.remove()">x</span>`; 
                s.querySelector('.remove-item-btn').onclick = () => { set.delete(n); renderSelectedItems(type); };
                div.appendChild(s); 
            }); 
        }

        // Configuração de Eventos Gerais
        settingsBtn.onclick = showPopup;
        closePopupBtn.onclick = hidePopup;
        saveCollectionBtn.onclick = () => saveNewItem('colecao', newCollectionInput);
        saveTagBtn.onclick = () => saveNewItem('tag', newTagInput);
        saveTrackBtn.onclick = saveNewTrack;
        
        trackCollectionsSearchInput.oninput = () => handleSearch('colecao', trackCollectionsSearchInput.value, collectionSearchResultsDiv);
        trackTagsSearchInput.oninput = () => handleSearch('tag', trackTagsSearchInput.value, tagSearchResultsDiv);

        // Menu Mobile e Overlay
        menuToggle.onclick = () => { collectionsNav.classList.add('active'); overlay.classList.add('active'); };
        overlay.onclick = () => { collectionsNav.classList.remove('active'); overlay.classList.remove('active'); hidePopup(); };

        // Abas do Popup
        document.querySelector('.popup-tabs').onclick = (e) => {
            const btn = e.target.closest('.tab-btn');
            if (!btn) return;
            document.querySelectorAll('.tab-btn, .tab-panel').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        };

        // Filtro por Tag ao clicar na faixa
        tracksListDiv.onclick = (e) => {
            const tagEl = e.target.closest('.clickable-tag');
            if (tagEl) loadTracksByTag(tagEl.dataset.tag);
        };

        // Inicialização
        window.onload = () => { loadCollectionsNav(); loadAllTags(); };
    </script>
</body>
</html>
